[critical]
data_schema_version = "v9"
node_feature_dim = 12
node_types = 14
edge_types = 12
class_count = 10
class_order = ["CallToUnknown", "DenialOfService", "ExternalBug", "GasException", "IntegerUO", "MishandledException", "Reentrancy", "Timestamp", "TransactionOrderDependence", "UnusedReturn"]
data_stages = ["ingest", "preprocess", "represent", "label", "verify", "split", "register", "analyze", "export", "freshness"]
langgraph_entry = "ml_assessment"
langgraph_exit = "visualizer"
langgraph_node_count = 14
langgraph_nodes = ["ml_assessment", "quick_screen", "evidence_router", "rag_research", "static_analysis", "graph_explain", "formal_verification", "audit_check", "consensus_engine", "cross_validator", "synthesizer", "reflection", "explainer", "visualizer"]
proxy_input_dim = 128
proxy_hidden_dims = [64, 32]
proxy_output_dim = 10
proxy_parameter_count = 10666
circuit_version = "v2.0"
circuit_public_signals = 138
input_visibility = "Public"
output_visibility = "Public"
parameter_visibility = "Fixed"
check_mode = "UNSAFE"
registry_num_classes = 10
registry_input_offset = 128

[services.gateway]
port = 8000
source = "agents/src/api/gateway.py::GATEWAY_DEFAULT_PORT"
routes = ["GET /", "GET /health", "POST /audit", "GET /audit/{job_id}", "GET /audit"]

[services.ml]
port = 8001
source = "ml/src/inference/api.py::app"
routes = ["GET /health", "POST /predict", "POST /hotspots", "POST /fusion-embedding"]

[services.mcp_inference]
port = 8010
source = "agents/src/mcp/servers/inference_server.py::_SERVER_PORT"
tools = ["predict", "batch_predict"]

[services.mcp_rag]
port = 8011
source = "agents/src/mcp/servers/rag_server.py::_SERVER_PORT"
tools = ["search"]

[services.mcp_audit]
port = 8012
source = "agents/src/mcp/servers/audit/_config.py::_SERVER_PORT"
tools = ["get_latest_audit", "get_audit_history", "check_audit_exists", "submit_audit"]

[services.mcp_graph_inspector]
port = 8013
source = "agents/src/mcp/servers/graph_inspector_server.py::_SERVER_PORT"
tools = ["get_graph_hotspots"]

[services.mcp_representation]
port = 8014
source = "agents/src/mcp/servers/representation_server.py::_SERVER_PORT"
tools = ["get_function_cfgs"]

[services.anvil]
port = 8545
source = "contracts/foundry.toml::rpc_endpoints.anvil"


  dive:
    enabled: true
    tier: 1
    tier_subtype: gold
    connector: manual
    url: ""                           # Nature Sci. Data download URL; filled in Stage 1
    pin: ""
    crosswalk: sentinel_data/labeling/crosswalks/dive.yaml
    dive_class_mapping:                # per proposal §6.4
      reentrancy: Reentrancy
      access_control: ExternalBug       # sub-tier note: "may include UnusedReturn edge cases"
      arithmetic: IntegerUO
      unchecked_low_level_calls: CallToUnknown  # subject to merge rule
      denial_of_service: DoS
      front_running: TOD
      time_manipulation: Timestamp
      # bad_randomness: DROPPED (no 10-class equivalent; see proposal §6.3.3)
    description: "CRITICAL #3 — Nature Sci. Data 2025, 22,330 contracts, 8 DASP classes, multi-label, peer-reviewed; 'bad randomness' dropped"


# sentinel-data pipeline configuration
# Single source of truth for: which sources are enabled, pins, thresholds, and pipeline settings.
# Bump pipeline.schema_version when graph_schema.py changes.
#
# v2 source list (per Sentinel_v2_Data_Module_Integration_Proposal.md §6 + datasources_suggestions.md):
#   Tier 1 (gold):       8 sources — human-audited, peer-reviewed, or mathematically certain labels
#   Tier 2 clean/silver: 5 sources — expert auditors + tool consensus + verified real exploits
#   Tier 3 structural:   3 sources — well-known benchmarks
#   Tier 3 bronze:       2 sources — tool-derived (T3 conservative, per friend 97% FP warning)
#   Tier 4 bronze:       2 sources — unlabeled/single-class pretraining
#   Deferred:            BCCC-SCsVul-2024 (preserved at legacy path, NOT consumed by v2)
#   Plus 2 v1 extras:    Zenodo 16910242 (CLEAR), Messi-Q

pipeline:
  schema_version: "v9"                # must match FEATURE_SCHEMA_VERSION in graph_schema.py
  export_shard_size: 5000             # contracts per export shard
  mlflow:
    uri: "sqlite:///mlruns.db"        # NEVER use file:/// — experiments 1/2/3 are corrupt there
  solc:
    baseline_versions:                # pre-installed in Dockerfile; the other 92 are on-demand
      - "0.4.26"
      - "0.5.17"
      - "0.6.12"
      - "0.7.6"
      - "0.8.20"
      - "0.8.24"
  dedup:
    ast_similarity_threshold: 0.85   # empirical sweet spot for Solidity copy-paste-with-edits
  verification:
    fail_threshold: 0.30             # drop label if tool confidence < this
    tool_corroboration_min: 1        # minimum number of tools that must agree to keep label
    negative_tool_hit_threshold: 0.05  # >5% of NonVulnerable flagged by tools = warning; >10% = FAIL

# ── Tier-1 (gold) sources — human-curated or mathematically certain labels ────
sources:

  scabench:
    enabled: true
    tier: 1
    connector: git
    url: "https://github.com/scabench-org/scabench"
    pin: ""                          # set before Stage 1 starts
    post_clone_cmd: "python checkout_sources.py"
    crosswalk: sentinel_data/labeling/crosswalks/scabench.yaml
    description: "31 projects, 555 vulns from real audit ecosystems (C4/Cantina/Sherlock)"

  smartbugs_curated:
    enabled: true
    tier: 1
    connector: git
    url: "https://github.com/smartbugs/smartbugs-curated"
    pin: ""
    crosswalk: sentinel_data/labeling/crosswalks/smartbugs_curated.yaml

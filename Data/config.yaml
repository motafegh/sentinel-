# sentinel-data pipeline configuration
# Single source of truth for: which sources are enabled, pins, thresholds, and pipeline settings.
# Bump pipeline.schema_version when graph_schema.py changes.
#
# v2 source list (per Sentinel_v2_Data_Module_Integration_Proposal.md §6 — REVISED 2026-06-09):
#   CRITICAL-PATH (Run 11 ships with these 5 + DISL negatives):
#     - DeFiHackLabs (T1 Gold)    — exploit PoC, T0 confidence
#     - SolidiFI (T1 Gold)        — 100% ground truth via injection
#     - DIVE (T1 Gold)            — peer-reviewed, multi-label
#     - SmartBugs Curated (T3)    — 143 hand-labeled contracts
#     - Web3Bugs (T1 Gold)        — contest-verified
#     - DISL (T4 Bronze)          — 514K unlabeled, NonVulnerable pool only (3:1 cap)
#   ADDITIVE (v2.1, deferred — included if Stage 3 finishes early):
#     - Bastet (T1 Gold)          — REPLACES Code4rena scraper (legal risk)
#     - FORGE (T1 Gold)           — 50-entry agreement test required
#     - ScrawlD (T2 Silver)       — 5-tool majority voting
#     - DeFi Hacks REKT (T2 Gold) — verified real exploits
#     - Ethernaut (T2 Clean)      — 30 pedagogical CTF levels
#     - OpenZeppelin Contracts (T2 Clean) — multi-audit-verified negatives
#     - solidity_defi_vulns (T1)  — 270 bridge examples
#     - DeFiVulnLabs (T3)         — 48 vuln types
#     - SC-Bench (T3)             — audited + err-inj subsets
#     - SmartBugs Wild (T3)       — 47K contracts (pretraining only, friend warns 97% FP)
#     - slither-audited (T3)      — 467K Slither-labeled
#     - Messi-Q (T4)              — older Solidity era
#     - Zenodo 16910242 (T4)      — Yizhou Chen's CLEAR ICSE 2025
#   DROPPED: ReentrancyStudy (230K single-class recreates BCCC imbalance, URL TBD anyway)
#   DEFERRED: BCCC-SCsVul-2024 (v2.1 decision pending v2 baseline results)
#
# Friend-review analysis archived in friend_review_applied_2026-06-09.md

pipeline:
  schema_version: "v9"                # must match FEATURE_SCHEMA_VERSION in graph_schema.py
  export_shard_size: 5000             # contracts per export shard
  mlflow:
    uri: "sqlite:///mlruns.db"        # NEVER use file:/// — experiments 1/2/3 are corrupt there
  solc:
    baseline_versions:                # pre-installed in Dockerfile; the other 92 are on-demand
      - "0.4.26"
      - "0.5.17"
      - "0.6.12"
      - "0.7.6"
      - "0.8.20"
      - "0.8.24"
  dedup:
    ast_similarity_threshold: 0.85   # empirical sweet spot for Solidity copy-paste-with-edits
  verification:
    fail_threshold: 0.30             # drop label if tool confidence < this
    tool_corroboration_min: 1        # minimum number of tools that must agree to keep label
    negative_tool_hit_threshold: 0.05  # >5% of NonVulnerable flagged by tools = warning; >10% = FAIL
  # NEW 2026-06-09 (friend review §6.3.1): NonVulnerable class size cap to prevent BCCC-style imbalance
  negative:
    positive_ratio_max: 3.0          # NonVulnerable class count ≤ 3× total positive count across all 10 classes
    # The cap is enforced in Stage 5 stratified_splitter; subsample is stratified by source.
    # Per-class override available: pipeline.negative.per_class_ratio_max.<ClassName>: 5.0
  # NEW 2026-06-09 (friend review §6.3.2): CallToUnknown merge rule, human-checked
  class:
    merge_rules:
      - trigger: if CallToUnknown_verified_count < 300
        action: pause_and_ask_human   # not silent auto-merge
        apply:
          labels.class_map.CallToUnknown: ExternalBug
        reversible: true               # split back in v2.1 if 1000+ verified
        reason: "10-class softmax with 1 class <500 samples is statistically unlearnable (BCCC failure pattern at smaller scale)"
  # NEW 2026-06-09 (friend review §6.5): minimum-viable-corpus gate
  min_viable_corpus:
    total_contracts_min: 4000         # if below, defer Run 11
    per_class_positive_min_major: 300 # Reentrancy, DoS, IntegerUO
    per_class_positive_min_minor: 100 # other 7 classes
    call_to_unknown_min: 300          # below this, the merge rule triggers
    smartbugs_curated_recall_min: 0.90  # semantic_checker must retain ≥90% of the 143 hand-labeled positives
    forge_agreement_min: 0.85         # FORGE 50-entry agreement test; if <85%, defer FORGE to v2.2

# ── CRITICAL-PATH (Run 11 ships with these 5) ───────────────────────────────
sources_critical_path:

  defihacklabs:
    enabled: true
    tier: 1
    tier_subtype: gold
    connector: git
    url: "https://github.com/SunWeb3Sec/DeFiHackLabs"
    pin: ""
    crosswalk: sentinel_data/labeling/crosswalks/defihacklabs.yaml
    description: "CRITICAL #1 — 400+ real exploit PoCs from DeFi Hack Labs; folder name = exploit type; T0 confidence"

  solidifi:
    enabled: true
    tier: 1
    tier_subtype: gold
    connector: git
    url: "https://github.com/DependableSystemsLab/SolidiFI-benchmark"
    pin: ""
    crosswalk: sentinel_data/labeling/crosswalks/solidifi.yaml

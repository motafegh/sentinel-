[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
cache_path     = "cache"

# Default compiler - AuditRegistry, IZKMLVerifier, SentinelToken.
# SPEC s6 Critical Constraints: all non-ZKMLVerifier contracts use 0.8.20.
solc           = "0.8.20"
optimizer      = true
optimizer_runs = 200

# --- ZKMLVerifier EXCEPTION -----------------------------------------------
# ZKMLVerifier.sol is auto-generated by EZKL from verification_key.vk.
# EZKL Halo2 assembly uses deprecated opcodes incompatible with solc 0.8.20.
# Compile ZKMLVerifier.sol separately:
#   solc-select use 0.8.17
#   forge build --contracts src/ZKMLVerifier.sol
#   solc-select use 0.8.20
# ADR-002: AuditRegistry uses IZKMLVerifier interface - no concrete import,
# so mixed-solc compilation is safe.
# --------------------------------------------------------------------------

[profile.default.remappings]
"@openzeppelin/contracts/"             = "lib/openzeppelin-contracts/contracts/"
"@openzeppelin/contracts-upgradeable/" = "lib/openzeppelin-contracts-upgradeable/contracts/"

[fmt]
line_length     = 100
tab_width       = 4
bracket_spacing = true

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
